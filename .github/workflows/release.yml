name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build PCM archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bash PCM/create_pcm_archive.sh "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILE }}
          body: |
            ## Installation via KiCad Plugin Manager

            Open KiCad → **Plugin and Content Manager** → **Install from File**,
            then select the ZIP below.

            Or add the self-hosted repository to KiCad PCM:
            `https://raw.githubusercontent.com/z2amiller/kicad-pcm/main/repository.json`

            No separate `pip install` needed — dependencies are bundled.

            **SHA256:** `${{ env.DOWNLOAD_SHA256 }}`

      - name: Trigger PCM repository rebuild
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: rebuild.yml
          repo: z2amiller/kicad-pcm
          ref: main
          token: ${{ secrets.PCM_REPO_TOKEN }}
          inputs: |
            {
              "package_id": "com.github.z2amiller.manifest-creator",
              "version": "${{ env.VERSION }}",
              "download_url": "${{ env.DOWNLOAD_URL }}",
              "download_sha256": "${{ env.DOWNLOAD_SHA256 }}",
              "download_size": "${{ env.DOWNLOAD_SIZE }}",
              "install_size": "${{ env.INSTALL_SIZE }}"
            }
